definitions:
  instance: &instance
    instance_type: mac_mini_m2
    max_build_duration: 90

  env_versions: &env_versions
    node: 20
    xcode: 26.4
    cocoapods: default

  cache: &cache
    cache_paths:
      - ~/Library/Caches/CocoaPods
      - $CM_BUILD_DIR/node_modules

  scripts:
    - &install_js_deps
      name: Install JavaScript dependencies (auto-detect package manager)
      script: |
        set -eo pipefail
        if [ -f pnpm-lock.yaml ]; then
          echo "Detected pnpm-lock.yaml — using pnpm"
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm install --frozen-lockfile
        elif [ -f package-lock.json ]; then
          echo "Detected package-lock.json — using npm ci"
          npm ci
        else
          echo "No lockfile found — using npm install"
          npm install
        fi
        echo "Verifying babel-preset-expo is resolvable:"
        node -e "console.log(require.resolve('babel-preset-expo'))"

    - &expo_prebuild_ios
      name: Clean Expo iOS prebuild
      script: |
        set -eo pipefail
        rm -rf ios
        npx expo prebuild --platform ios --clean

    - &pod_install
      name: Install CocoaPods dependencies
      script: |
        set -eo pipefail
        cd ios
        pod install 2>&1 | tee /tmp/pod_install.log
        cd ..

    - &patch_fmt_xcode26
      name: Patch fmt for Xcode 26.4 (RN#55601)
      script: |
        set -eo pipefail

        # Header-level: force-disable consteval
        FMT_BASE="ios/Pods/fmt/include/fmt/base.h"
        test -f "$FMT_BASE" || { echo "ERROR: $FMT_BASE not found"; exit 1; }
        chmod u+w "$FMT_BASE"
        printf '#ifndef FMT_USE_CONSTEVAL\n#define FMT_USE_CONSTEVAL 0\n#endif\n%s' "$(cat "$FMT_BASE")" > "$FMT_BASE"
        echo "base.h head:"
        head -5 "$FMT_BASE"

        # Target-level (outranks xcconfig): edit Pods.xcodeproj directly
        ruby <<'RUBY'
        require 'xcodeproj'
        project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')
        patched = false
        project.targets.each do |t|
          next unless t.name == 'fmt'
          t.build_configurations.each do |c|
            c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
            c.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = ['$(inherited)', 'FMT_USE_CONSTEVAL=0']
            c.build_settings['OTHER_CPLUSPLUSFLAGS'] = ['$(inherited)', '-Wno-invalid-constexpr']
            puts "Patched fmt target config: #{c.name}"
            patched = true
          end
        end
        abort 'ERROR: fmt target not found in Pods.xcodeproj' unless patched
        project.save
        RUBY

        # PROOF: resolved settings the compiler will actually use
        echo "=== Resolved fmt build settings (Release) ==="
        xcodebuild -project ios/Pods/Pods.xcodeproj -target fmt -configuration Release -showBuildSettings 2>/dev/null | grep -E "CLANG_CXX_LANGUAGE_STANDARD|GCC_PREPROCESSOR_DEFINITIONS|OTHER_CPLUSPLUSFLAGS"

    - &resolve_workspace
      name: Resolve Xcode workspace
      script: |
        set -eo pipefail
        ls -la ios
        test -f ios/Podfile.lock || { echo "ERROR: Podfile.lock missing — pod install failed"; exit 1; }
        test -f ios/Pods/Manifest.lock || { echo "ERROR: Manifest.lock missing — pod install failed"; exit 1; }
        WORKSPACE_PATH=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
        test -n "$WORKSPACE_PATH" || { echo "ERROR: No .xcworkspace found"; exit 1; }
        echo "Resolved workspace: $WORKSPACE_PATH"
        echo "XCODE_WORKSPACE=$WORKSPACE_PATH" >> $CM_ENV

    - &keychain_init
      name: Set up keychain
      script: |
        set -eo pipefail
        keychain initialize

    - &keychain_certs
      name: Add certificates to keychain
      script: |
        set -eo pipefail
        keychain add-certificates

    - &use_profiles
      name: Apply provisioning profiles
      script: |
        set -eo pipefail
        xcode-project use-profiles --warn-only

    - &increment_build_number
      name: Increment build number
      script: |
        set -eo pipefail
        cd $CM_BUILD_DIR/ios
        LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_ID" || echo "0")
        echo "Latest TestFlight build number: $LATEST_BUILD_NUMBER"
        agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))

    - &list_schemes
      name: Show available Xcode schemes
      script: |
        set -eo pipefail
        xcodebuild -list -workspace "$XCODE_WORKSPACE"

    - &build_ipa
      name: Build iOS IPA
      script: |
        set -eo pipefail
        xcode-project build-ipa \
          --workspace "$XCODE_WORKSPACE" \
          --scheme "$XCODE_SCHEME"

  artifacts:
    - &ipa build/ios/ipa/*.ipa
    - &xcode_logs /tmp/xcodebuild_logs/*.log
    - &pod_log /tmp/pod_install.log
    - &dsym $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  testflight_publish: &testflight_publish
    app_store_connect:
      auth: integration
      submit_to_testflight: true
      submit_to_app_store: false

workflows:
  ios-testflight:
    name: iOS TestFlight Build (Ari)
    <<: *instance
    integrations:
      app_store_connect: "Pinegrasscm"
    environment:
      <<: *env_versions
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pinegrass.ari
      vars:
        BUNDLE_ID: "com.pinegrass.ari"
        XCODE_SCHEME: "Ari"
        APP_ID: 6789322260   # <-- REPLACE: Ari's numeric Apple ID from App Store Connect > App Information
    cache:
      <<: *cache
    scripts:
      - *install_js_deps
      - *expo_prebuild_ios
      - *pod_install
      - *patch_fmt_xcode26
      - *resolve_workspace
      - *keychain_init
      - *keychain_certs
      - *use_profiles
      - *increment_build_number
      - *list_schemes
      - *build_ipa
    artifacts:
      - *ipa
      - *xcode_logs
      - *pod_log
      - *dsym
    publishing:
      <<: *testflight_publish