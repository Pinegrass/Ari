definitions:
  install_deps: &install_deps
    name: Install JS dependencies (auto-detect pm)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      if [ -f pnpm-lock.yaml ]; then
        echo "=== Detected pnpm ==="
        corepack enable
        corepack prepare pnpm@latest --activate
        test -f .npmrc && grep -q "node-linker=hoisted" .npmrc || { echo "ERROR: pnpm repo missing .npmrc with node-linker=hoisted"; exit 1; }
        pnpm install --frozen-lockfile
      elif [ -f package-lock.json ]; then
        echo "=== Detected npm ==="
        npm ci
      else
        echo "=== No lockfile match, falling back to npm install ==="
        npm install
      fi
      echo "=== Verifying babel-preset-expo resolves ==="
      node -e "require.resolve('babel-preset-expo')" || { echo "ERROR: babel-preset-expo not resolvable"; exit 1; }

  prebuild_ios: &prebuild_ios
    name: Clean Expo iOS prebuild
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      rm -rf ios
      npx expo prebuild --platform ios --clean

  diagnose_entitlements: &diagnose_entitlements
    name: Diagnose entitlements files and App Group config (debug)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      mkdir -p /tmp/pinegrass_debug
      echo "=== Searching for all .entitlements files in ios/ ==="
      find ios -iname "*.entitlements" | tee /tmp/pinegrass_debug/entitlements_file_list.txt

      echo ""
      echo "=== Contents of each .entitlements file ==="
      while IFS= read -r f; do
        echo "--- $f ---"
        cat "$f"
        echo ""
        cp "$f" "/tmp/pinegrass_debug/$(basename "$f")"
      done < /tmp/pinegrass_debug/entitlements_file_list.txt

      echo ""
      echo "=== Searching app.json / app.config.js for App Group / ShareExtension / entitlements config ==="
      for cfg in app.json app.config.js app.config.ts; do
        if [ -f "$cfg" ]; then
          echo "--- $cfg (grep for group/entitlement/share) ---"
          grep -n -i "group\|entitlement\|share" "$cfg" || echo "(no matches)"
        fi
      done

      echo ""
      echo "=== ShareExtension target settings from project.pbxproj (CODE_SIGN / ENTITLEMENTS lines) ==="
      find ios -iname "project.pbxproj" -exec grep -n -i "entitlement\|CODE_SIGN_ENTITLEMENTS\|PRODUCT_BUNDLE_IDENTIFIER" {} \; | tee /tmp/pinegrass_debug/pbxproj_signing_lines.txt

  modular_headers: &modular_headers
    name: Insert modular_headers pod flags into Podfile target block (Firebase/Stripe apps)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      test -f ios/Podfile || { echo "ERROR: ios/Podfile not found"; exit 1; }
      echo "=== Podfile BEFORE patch ==="
      cat -n ios/Podfile

      if grep -q "PINEGRASS_MODULAR_HEADERS_PATCH" ios/Podfile; then
        echo "Patch marker already present, skipping insert"
      else
        # CORRECT MECHANISM (confirmed against multiple real-world fixes for this exact
        # "cannot yet be integrated as static libraries: AppCheckCore depends upon
        # GoogleUtilities and RecaptchaInterop" error — seen identically in Expo+Stripe
        # monorepo setups): the fix must be `pod 'X', :modular_headers => true` declared
        # INSIDE the target block at Podfile-parse time. A post_install hook runs too
        # late — CocoaPods already fails the static-library check during dependency
        # resolution, before post_install ever executes. A global use_modular_headers!
        # can also conflict with Expo's own config-plugin Podfile injections.
        #
        # We anchor on `use_expo_modules!` or `use_native_modules!`, both of which are
        # reliably present near the top of every Expo-generated target block, and insert
        # the pod declarations immediately after via Ruby (robust to whitespace/quoting,
        # unlike a bash regex).
        ruby -e '
          content = File.read("ios/Podfile")
          marker = "  # PINEGRASS_MODULAR_HEADERS_PATCH\n" \
                   "  pod %(GoogleUtilities), :modular_headers => true\n" \
                   "  pod %(RecaptchaInterop), :modular_headers => true\n" \
                   "  pod %(AppCheckCore), :modular_headers => true\n"

          anchor_patterns = [
            /^\s*use_expo_modules!\s*$/,
            /^\s*config\s*=\s*use_native_modules!.*$/,
            /^\s*use_native_modules!.*$/
          ]

          inserted = false
          anchor_patterns.each do |pattern|
            if content =~ pattern
              content = content.sub(pattern) { |match| "#{match}\n#{marker}" }
              inserted = true
              break
            end
          end

          unless inserted
            # Fallback: insert right after the first "target Y do" line
            if content =~ /^(target .* do\s*)$/
              content = content.sub(/^(target .* do\s*)$/) { "#{$1}\n#{marker}" }
              inserted = true
            end
          end

          abort("ERROR: could not find a safe anchor point (use_expo_modules!/use_native_modules!/target block) in Podfile") unless inserted

          File.write("ios/Podfile", content)
          puts "Inserted modular_headers pod declarations"
        '
      fi

      echo "=== Podfile AFTER patch ==="
      cat -n ios/Podfile
      grep -n "PINEGRASS_MODULAR_HEADERS_PATCH\|modular_headers" ios/Podfile || { echo "ERROR: patch verification failed — marker not found post-insert"; exit 1; }

  capture_podfile_debug: &capture_podfile_debug
    name: Capture patched Podfile as downloadable artifact (debug)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      mkdir -p /tmp/pinegrass_debug
      cp ios/Podfile /tmp/pinegrass_debug/Podfile_after_modular_headers_patch.rb
      echo "=== Copied Podfile to /tmp/pinegrass_debug for artifact upload ==="
      cat -n /tmp/pinegrass_debug/Podfile_after_modular_headers_patch.rb

      echo "=== Podfile AFTER patch (last 25 lines) ==="
      tail -25 ios/Podfile
      grep -n "PINEGRASS_MODULAR_HEADERS_PATCH" ios/Podfile

  pod_install: &pod_install
    name: Pod install
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      cd ios
      pod install
      cd ..

  fmt_diagnose: &fmt_diagnose
    name: Diagnose fmt pod presence and path (self-detecting)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      echo "=== Podfile.lock fmt entry ==="
      grep -A2 -i '\- fmt' ios/Podfile.lock 2>/dev/null || echo "NO_FMT_IN_LOCKFILE"
      echo "=== Searching for fmt header files ==="
      FOUND_BASE=$(find ios/Pods -iname "base.h" -path "*fmt*" 2>/dev/null | head -1)
      FOUND_CORE=$(find ios/Pods -iname "core.h" -path "*fmt*" 2>/dev/null | head -1)
      echo "base.h candidate: ${FOUND_BASE:-none}"
      echo "core.h candidate: ${FOUND_CORE:-none}"
      # Persist findings for the next step via a dotfile (Codemagic script steps share the workspace)
      echo "FMT_HEADER_PATH=${FOUND_BASE:-$FOUND_CORE}" > /tmp/fmt_env.sh
      cat /tmp/fmt_env.sh

  fmt_patch: &fmt_patch
    name: Patch fmt for Xcode 26.4 (RN#55601) — conditional
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      source /tmp/fmt_env.sh 2>/dev/null || true
      if [ -z "$FMT_HEADER_PATH" ] || [ ! -f "$FMT_HEADER_PATH" ]; then
        echo "=== No fmt header found — this app does not vendor fmt directly, or Podfile.lock has no fmt entry. Skipping patch. ==="
        exit 0
      fi
      echo "=== Patching $FMT_HEADER_PATH ==="
      chmod u+w "$FMT_HEADER_PATH"
      printf '#ifndef FMT_USE_CONSTEVAL\n#define FMT_USE_CONSTEVAL 0\n#endif\n%s' "$(cat "$FMT_HEADER_PATH")" > "$FMT_HEADER_PATH"
      echo "Patched header head:"
      head -5 "$FMT_HEADER_PATH"

      ruby <<'RUBY'
      require 'xcodeproj'
      project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')
      patched = false
      project.targets.each do |t|
        next unless t.name == 'fmt'
        t.build_configurations.each do |c|
          c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
          existing_defs = c.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || ['$(inherited)']
          existing_defs = [existing_defs] if existing_defs.is_a?(String)
          c.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = (existing_defs + ['FMT_USE_CONSTEVAL=0']).uniq
          existing_flags = c.build_settings['OTHER_CPLUSPLUSFLAGS'] || ['$(inherited)']
          existing_flags = [existing_flags] if existing_flags.is_a?(String)
          c.build_settings['OTHER_CPLUSPLUSFLAGS'] = (existing_flags + ['-Wno-invalid-constexpr']).uniq
          puts "Patched fmt target config: #{c.name}"
          patched = true
        end
      end
      if patched
        project.save
      else
        puts "WARNING: fmt header existed but no 'fmt' target found in Pods.xcodeproj — header-only patch applied, target-level settings skipped"
      end
      RUBY

      echo "=== Resolved fmt build settings (Release), if target exists ==="
      xcodebuild -project ios/Pods/Pods.xcodeproj -target fmt -configuration Release -showBuildSettings 2>/dev/null \
        | grep -E "CLANG_CXX_LANGUAGE_STANDARD|GCC_PREPROCESSOR_DEFINITIONS|OTHER_CPLUSPLUSFLAGS" \
        || echo "No 'fmt' target in Pods.xcodeproj (header-only patch still applied above)"

  resolve_workspace: &resolve_workspace
    name: Resolve workspace and fail-fast checks
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      WORKSPACE=$(find ios -maxdepth 1 -iname "*.xcworkspace" | head -1)
      test -n "$WORKSPACE" || { echo "ERROR: no .xcworkspace found in ios/"; exit 1; }
      echo "Using workspace: $WORKSPACE"
      test -f ios/Podfile.lock || { echo "ERROR: Podfile.lock missing — pod install did not run"; exit 1; }

  use_profiles: &use_profiles
    name: Use profiles in Xcode project
    script: xcode-project use-profiles --warn-only

  increment_build: &increment_build
    name: Increment build number
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_ID" || echo "0")
      NEXT=$((LATEST + 1))
      echo "Latest TestFlight build: $LATEST -> setting: $NEXT"
      cd ios
      agvtool new-version -all "$NEXT"
      cd ..

  list_schemes: &list_schemes
    name: List schemes (diagnostic)
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      WORKSPACE=$(find ios -maxdepth 1 -iname "*.xcworkspace" | head -1)
      xcodebuild -workspace "$WORKSPACE" -list

  build_ipa: &build_ipa
    name: Build ipa for distribution
    script: |
      #!/usr/bin/env bash
      set -eo pipefail
      xcode-project build-ipa \
        --workspace "ios/$(find ios -maxdepth 1 -iname '*.xcworkspace' -exec basename {} \;)" \
        --scheme "$XCODE_SCHEME"

  publish_block: &publish_block
    app_store_connect:
      auth: integration
      submit_to_testflight: true

workflows:
  ari-ios-workflow:
    name: Ari - iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: Pinegrasscm
    environment:
      groups:
        - ari_ios
      vars:
        BUNDLE_ID: "com.pinegrass.ari"
        XCODE_SCHEME: "Ari"
        APP_ID: "6789322260"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
      node: 20
      xcode: 26.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.pinegrass.ari"
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - <<: *install_deps
      - <<: *prebuild_ios
      - <<: *diagnose_entitlements
      - <<: *modular_headers   # Ari uses Firebase — keep this step
      - <<: *capture_podfile_debug
      - <<: *pod_install
      - <<: *fmt_diagnose
      - <<: *fmt_patch
      - <<: *resolve_workspace
      - <<: *use_profiles
      - <<: *increment_build
      - <<: *list_schemes
      - <<: *build_ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/pinegrass_debug/*
    publishing:
      <<: *publish_block