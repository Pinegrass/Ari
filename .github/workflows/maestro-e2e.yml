name: E2E Tests (Maestro)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Run E2E nightly at 2 AM UTC
    - cron: '0 2 * * *'

concurrency:
  group: maestro-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Maestro E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --legacy-peer-deps

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # The org Actions policy blocks third-party actions such as
      # reactivecircus/android-emulator-runner, so the emulator is brought
      # up manually in plain shell steps (ubuntu-latest ships the Android
      # SDK via $ANDROID_HOME and supports KVM).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      # Local Gradle builds on the free runner proved flaky at ~25 min
      # (Metaspace OOM in lint workers, then packageRelease failing under
      # resource pressure — different failure each run). The EAS cloud
      # build is proven green; download the APK artifact and spend the
      # job budget on the emulator and flows instead.
      - name: Build release APK (EAS cloud) and download
        timeout-minutes: 40
        run: |
          eas build --platform android --profile e2e --non-interactive --json > build.json
          URL=$(node -e "const b=require('./build.json');const a=Array.isArray(b)?b[0]:b;const u=a.artifacts&&(a.artifacts.buildUrl||a.artifacts.applicationArchiveUrl);if(!u){console.error('No artifact URL in build.json');process.exit(1)}console.log(u)")
          curl -fL "$URL" -o app.apk
          ls -lh app.apk

      - name: Add Android SDK tools to PATH
        # ubuntu-latest sets $ANDROID_HOME but only platform-tools is on
        # PATH; sdkmanager/avdmanager/emulator need explicit entries.
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Create AVD (api 34, x86_64, pixel_6)
        env:
          # Pin the AVD location so avdmanager and the emulator binary
          # agree on it regardless of runner env quirks.
          ANDROID_AVD_HOME: /home/runner/.android/avd
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "system-images;android-34;google_apis;x86_64" "emulator" "platform-tools"
          # avdmanager create silently no-ops (exits 0, creates nothing)
          # with this runner's cmdline-tools, so create the AVD by hand —
          # an AVD is just an .ini + config.ini; the emulator fills in
          # the rest on first boot.
          mkdir -p "$ANDROID_AVD_HOME/maestro.avd"
          printf 'avd.ini.encoding=UTF-8\npath=%s\npath.rel=avd/maestro.avd\ntarget=android-34\n' \
            "$ANDROID_AVD_HOME/maestro.avd" > "$ANDROID_AVD_HOME/maestro.ini"
          cat > "$ANDROID_AVD_HOME/maestro.avd/config.ini" <<EOF
          avd.ini.encoding=UTF-8
          AvdId=maestro
          abi.type=x86_64
          avd.ini.displayname=maestro
          disk.dataPartition.size=6442450944
          hw.device.name=pixel_6
          image.sysdir.1=system-images/android-34/google_apis/x86_64/
          tag.display=Google APIs
          tag.id=google_apis
          target=android-34
          EOF
          emulator -list-avds
          ls -la "$ANDROID_AVD_HOME"

      - name: Boot emulator and wait for boot
        timeout-minutes: 12
        env:
          ANDROID_AVD_HOME: /home/runner/.android/avd
        run: |
          emulator -list-avds
          emulator -avd maestro -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot > emulator.log 2>&1 &
          EMU_PID=$!
          # adb wait-for-device blocks forever if the emulator never
          # appears; poll instead, detect a dead emulator process, and
          # dump emulator.log so boot failures are diagnosable.
          boot_completed=""
          elapsed=0
          while [ "$boot_completed" != "1" ]; do
            if ! kill -0 $EMU_PID 2>/dev/null; then
              echo "Emulator process exited; emulator.log follows:"
              cat emulator.log
              exit 1
            fi
            if [ "$elapsed" -ge 600 ]; then
              echo "Emulator failed to boot within ${elapsed}s; emulator.log follows:"
              cat emulator.log
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r') || true
          done
          echo "Emulator booted after ${elapsed}s"

      - name: Install APK and run Maestro flows
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        run: |
          adb shell input keyevent 82
          adb install -r ./app.apk
          maestro test .maestro/login_flow.yaml
          maestro test .maestro/navigation_flow.yaml
          maestro test .maestro/add_transaction_flow.yaml
          maestro test .maestro/tomo_chat_flow.yaml
          maestro test .maestro/export_flow.yaml

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: ~/.maestro/tests/
          retention-days: 7
