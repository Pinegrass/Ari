name: E2E Tests (Maestro)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Run E2E nightly at 2 AM UTC
    - cron: '0 2 * * *'

concurrency:
  group: maestro-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Maestro E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci --legacy-peer-deps

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # The org Actions policy blocks third-party actions such as
      # reactivecircus/android-emulator-runner, so the emulator is brought
      # up manually in plain shell steps (ubuntu-latest ships the Android
      # SDK via $ANDROID_HOME and supports KVM).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      # Build before booting the emulator so build failures fail fast.
      # The e2e profile produces a production-like release APK (no dev
      # client / Metro dependency) with autoIncrement off, which local
      # builds require.
      - name: Build release APK (EAS local)
        timeout-minutes: 45
        # EXPO_PUBLIC_* vars are inlined at bundle time for local builds, and
        # local builds do not pull EAS environment variables — without this the
        # app falls back to http://10.0.2.2:5000/api and every flow fails.
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://web-production-7c65f.up.railway.app/api' }}
          # lintVitalAnalyzeRelease (react-native-android-widget) OOMs on
          # Metaspace with default JVM args on CI runners.
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
        run: eas build --platform android --profile e2e --local --output ./app.apk --non-interactive

      - name: Add Android SDK tools to PATH
        # ubuntu-latest sets $ANDROID_HOME but only platform-tools is on
        # PATH; sdkmanager/avdmanager/emulator need explicit entries.
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Create AVD (api 34, x86_64, pixel_6)
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "system-images;android-34;google_apis;x86_64"
          echo no | avdmanager create avd --force -n maestro -k "system-images;android-34;google_apis;x86_64" --device "pixel_6"

      - name: Boot emulator and wait for boot
        run: |
          emulator -avd maestro -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect > emulator.log 2>&1 &
          adb wait-for-device
          boot_completed=""
          elapsed=0
          while [ "$boot_completed" != "1" ]; do
            if [ "$elapsed" -ge 300 ]; then
              echo "Emulator failed to boot within 300s"
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r') || true
          done
          echo "Emulator booted after ${elapsed}s"

      - name: Install APK and run Maestro flows
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        run: |
          adb shell input keyevent 82
          adb install -r ./app.apk
          maestro test .maestro/login_flow.yaml
          maestro test .maestro/navigation_flow.yaml
          maestro test .maestro/add_transaction_flow.yaml
          maestro test .maestro/tomo_chat_flow.yaml
          maestro test .maestro/export_flow.yaml

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: ~/.maestro/tests/
          retention-days: 7
