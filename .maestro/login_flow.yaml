appId: com.pinegrass.ari
name: Login Flow
# Refreshed for v1.1.0 (2026-07-05). The reskin removed the one-tap demo button
# (login is now email + password) and changed the tab labels + Dashboard CTA.
---
- launchApp:
    clearState: true
# First launch (clearState) shows OnboardingScreen — RootNavigator shows it
# when no onboarding flag is stored. Skip it to reach the Auth stack.
- tapOn:
    text: "Skip"
    optional: true
# "Pixel Launcher isn't responding" ANR dialogs pop up on software-rendered
# emulators; tap Wait if one is up so it doesn't block the app.
- tapOn:
    text: "Wait"
    optional: true
# Splash / value screen — the logo + tagline fade in over ~500ms
# (opacity-animated), so an immediate assertVisible races the animation
# on software-rendered emulators. Wait explicitly.
- extendedWaitUntil:
    visible: "Your Money, Your Future"
    timeout: 15000
- tapOn: "I already have an account"

# Login screen — fields matched by their placeholder text
- assertVisible: "Welcome back!"
- tapOn: "you@example.com"
- inputText: "demo@ari.app"
# Keyboard covers the password field after email input — dismiss before tapping.
- hideKeyboard
- tapOn: "Your password"
- inputText: "demo123"
- hideKeyboard
- tapOn: "Sign In"

# Lands on the Home tab (bottom tabs: Home / Trends / Tomo / More)
- assertVisible: "Home"
- assertVisible: "Trends"
- assertVisible: "Tomo"
# Dashboard sections fade in via AnimatedEntry — wait explicitly.
- extendedWaitUntil:
    visible: "Add an entry"
    timeout: 15000
