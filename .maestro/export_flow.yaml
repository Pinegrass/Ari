appId: com.pinegrass.ari
name: Export Data Flow
# Refreshed for v1.1.0 (2026-07-05). Settings tab is now labelled "More";
# Export is the "Export Data" row which opens an in-place sub-screen.
tags:
  - requires_auth
---
- tapOn: "More"

# Export Data sits below the fold in the current Settings design.
- scrollUntilVisible:
    element:
      text: "Export Data"
    direction: DOWN
- tapOn: "Export Data"
- assertVisible: "Export Data"

# Back to the More menu — the Export sub-screen is in-place state with
# its own Back button; tapping the More tab while already on it is a
# no-op and leaves the sub-screen open.
- tapOn: "Back"
- scrollUntilVisible:
    element:
      text: "Sign Out"
    direction: DOWN
- assertVisible: "Sign Out"
