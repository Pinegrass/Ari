appId: com.pinegrass.ari
name: Export Data Flow
# Refreshed for v1.1.0 (2026-07-05). Settings tab is now labelled "More";
# Export is the "Export Data" row which opens an in-place sub-screen.
tags:
  - requires_auth
---
- tapOn: "More"

- tapOn: "Export Data"
- assertVisible: "Export Data"

# Back to the More menu
- tapOn: "More"
- assertVisible: "Sign Out"
