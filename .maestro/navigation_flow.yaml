appId: com.pinegrass.ari
name: Full Navigation Flow
# Refreshed for v1.1.0 (2026-07-05). Tabs are now Home / Trends / Tomo / More
# (Budget is no longer a tab — it lives under More). Center button = Add.
tags:
  - requires_auth
---
# Bottom tabs present
- assertVisible: "Home"
- assertVisible: "Trends"
- assertVisible: "Tomo"
- assertVisible: "More"

# Trends (was "Expenses")
- tapOn: "Trends"
- assertVisible: "Trends"

# Tomo
- tapOn: "Tomo"
# The input placeholder is a TextInput hint, which RN does not expose to
# the accessibility hierarchy Maestro reads — assert the rendered header
# subtitle instead.
- assertVisible: "Your AI Finance Coach"

# More (was "Settings") — the Export/Sign Out rows live below the fold
# in the current design, so scroll them into view first.
- tapOn: "More"
- scrollUntilVisible:
    element:
      text: "Sign Out"
    direction: DOWN
- assertVisible: "Export Data"
- assertVisible: "Sign Out"

# Back to Home — dashboard sections fade in via AnimatedEntry; wait.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Add an entry"
    timeout: 15000
