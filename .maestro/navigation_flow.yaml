appId: com.pinegrass.ari
name: Full Navigation Flow
# Refreshed for v1.1.0 (2026-07-05). Tabs are now Home / Trends / Tomo / More
# (Budget is no longer a tab — it lives under More). Center button = Add.
tags:
  - requires_auth
---
# Bottom tabs present
- assertVisible: "Home"
- assertVisible: "Trends"
- assertVisible: "Tomo"
- assertVisible: "More"

# Trends (was "Expenses")
- tapOn: "Trends"
- assertVisible: "Trends"

# Tomo
- tapOn: "Tomo"
# Placeholder is "Ask Tomo anything..." — substring match, no regex
# (current Maestro rejects the `regex` selector property).
- assertVisible: "Ask Tomo"

# More (was "Settings")
- tapOn: "More"
- assertVisible: "Export"
- assertVisible: "Sign Out"

# Back to Home — dashboard sections fade in via AnimatedEntry; wait.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Add an entry"
    timeout: 15000
