appId: com.pinegrass.ari
name: Tomo Chat Flow
# Refreshed for v1.1.0 (2026-07-05). Tomo greets casually (Hey/Hi, never
# Namaste); input placeholder is "Ask Tomo anything...".
tags:
  - requires_auth
---
- tapOn: "Tomo"

# Send a quick prompt (these render as tappable chips on an empty chat)
- tapOn: "How much did I spend this month?"

# The user's message echoes into the transcript
- assertVisible: "How much did I spend this month?"

# The quick-prompt section ("Try asking:") disappears once the chat has
# messages — confirms the send path rendered. (The input placeholder is
# a TextInput hint, invisible to Maestro; and reply text is dynamic, so
# asserting on it would be flaky against the live AI backend.)
- extendedWaitUntil:
    notVisible: "Try asking:"
    timeout: 20000
