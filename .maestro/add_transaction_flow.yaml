appId: com.pinegrass.ari
name: Add / Edit Transaction Flow
# Refreshed for v1.1.0 (2026-07-05). Fast Entry reskin: amount is entered on an
# in-app numeric keypad (no text field), the CTA is "Add an entry", and the
# button reads "Save entry" / "Update entry".
tags:
  - requires_auth
---
# From the Home tab
- tapOn: "Add an entry"

# Fast-entry screen — tap keypad digits for ₹500
- tapOn: "5"
- tapOn: "0"
- tapOn: "0"
# Maestro matches element text exactly — the display node is "₹500".
- assertVisible: "₹500"

# Save
- tapOn: "Save entry"

# Back on Home — the entry is reflected in the ledger / recent list
- assertVisible: "Home"

# Edit: the Recent list is windowed — rows enter the hierarchy only when
# scrolled on screen (a scroll to the 'Recent' header is NOT enough, and
# 'Food' matches the Spending-by-category legend first). The row amount
# is '−₹500' with a Unicode minus (U+2212), unique on this screen —
# hero/month cards use ASCII '-' or bare '₹500'.
- scrollUntilVisible:
    element:
      text: "−₹500"
    direction: DOWN
- longPressOn: "−₹500"
- assertVisible: "Update entry"
- tapOn: "0"          # 500 -> 5000
- tapOn: "Update entry"
- assertVisible: "Home"
