appId: com.pinegrass.ari
name: Add / Edit Transaction Flow
# Refreshed for v1.1.0 (2026-07-05). Fast Entry reskin: amount is entered on an
# in-app numeric keypad (no text field), the CTA is "Add an entry", and the
# button reads "Save entry" / "Update entry".
tags:
  - requires_auth
---
# From the Home tab
- tapOn: "Add an entry"

# Fast-entry screen — tap keypad digits for ₹500
- tapOn: "5"
- tapOn: "0"
- tapOn: "0"
# Maestro matches element text exactly — the display node is "₹500".
- assertVisible: "₹500"

# Save
- tapOn: "Save entry"

# Back on Home — the entry is reflected in the ledger / recent list
- assertVisible: "Home"

# Edit: the Recent list is below the fold; scroll to it, then long-press
# the entry row (its visible text is the category "Food"; '₹500' also
# appears in the hero/month cards, so it can't target the row).
# TransactionItem.onLongPress opens the edit sheet.
- scrollUntilVisible:
    element:
      text: "Recent"
    direction: DOWN
- longPressOn: "Food"
- assertVisible: "Update entry"
- tapOn: "0"          # 500 -> 5000
- tapOn: "Update entry"
- assertVisible: "Home"
